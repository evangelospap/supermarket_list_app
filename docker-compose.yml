services:
  postgres:
    image: postgres:17
    container_name: supermarket-postgres
    environment:
      POSTGRES_DB: supermarket
      POSTGRES_USER: supermarket
      POSTGRES_PASSWORD: supermarket
    ports:
      - "54329:5432"
    volumes:
      - supermarket-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supermarket -d supermarket"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  supermarket-postgres-data:
